name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pandoc-online/shared-types build
      - run: pnpm --filter @pandoc-online/shared-types test
      - run: pnpm --filter @pandoc-online/web typecheck
      - run: pnpm --filter @pandoc-online/web lint
      - run: pnpm --filter @pandoc-online/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
      - run: pnpm --filter @pandoc-online/web exec playwright install chromium --with-deps
      - name: E2E smoke
        run: |
          pnpm --filter @pandoc-online/web start &
          npx --yes wait-on@8.0.1 -t 120000 http://127.0.0.1:3000
          pnpm --filter @pandoc-online/web test:e2e
        env:
          CI: "true"

  worker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r apps/worker/requirements.txt
      - run: pip install pytest httpx
      - name: Install pandoc for tests
        run: sudo apt-get update && sudo apt-get install -y pandoc pandoc-data
      - run: python -m pytest tests -q
        working-directory: apps/worker

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config
      - name: Build worker image
        run: docker build -t pandoc-worker:test apps/worker

  shell-escape-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify shell-escape disabled
        run: |
          ! grep -r 'shell-escape' apps/worker/app --include='*.py' | grep -v FORBIDDEN | grep -v forbidden || true
          grep -q 'PANDOC_FORBIDDEN_ARGS' apps/worker/app/config.py
          grep -q 'shell_escape' apps/worker/app/pandoc_runner.py
