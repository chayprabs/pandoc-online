name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pandoc-online/shared-types build && pnpm --filter @pandoc-online/web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
      - run: python -m pytest tests -q
        working-directory: apps/worker
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push worker image
        run: |
          IMAGE=ghcr.io/chayprabs/pandoc-online-worker
          docker build -t $IMAGE:${{ github.ref_name }} -t $IMAGE:latest apps/worker
          docker push $IMAGE:${{ github.ref_name }}
          docker push $IMAGE:latest
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
