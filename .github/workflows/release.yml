name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @pandoc-online/shared-types build && pnpm --filter @pandoc-online/web build
      - name: Build worker container
        run: docker build -t ghcr.io/chayprabs/pandoc-online-worker:${{ github.ref_name }} apps/worker
