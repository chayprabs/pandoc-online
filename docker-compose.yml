services:
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      JOB_ROOT: /tmp/pandoc-jobs
      JOB_TTL_SECONDS: "3600"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - pandoc-jobs:/tmp/pandoc-jobs

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    depends_on:
      worker:
        condition: service_healthy

volumes:
  pandoc-jobs:
